<!-- templates/admin/about.html -->
{% extends "admin/base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">About Section</h1>
</div>

<div class="bg-white rounded-xl shadow-md p-6">
    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-2">Section Title</label>
            <input type="text" name="title" value="{{ about.title }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-2">Content</label>
            <textarea name="content" rows="6" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">{{ about.content }}</textarea>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-2">Maker Name</label>
            <input type="text" name="maker_name" value="{{ about.maker_name }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
        </div>
        
        <div class="mb-6">
            <label class="block text-gray-700 font-medium mb-2">Maker Title</label>
            <input type="text" name="maker_title" value="{{ about.maker_title }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
        </div>
        
        <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition-colors">Save Changes</button>
    </form>
</div>
{% endblock %}
