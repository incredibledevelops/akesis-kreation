<!-- templates/admin/contact_info.html -->
{% extends "admin/base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">Contact Information</h1>
</div>

<div class="bg-white rounded-xl shadow-md p-6">
    <form method="POST">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-gray-700 font-medium mb-2">Email</label>
                <input type="email" name="email" value="{{ contact.email }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-2">WhatsApp Number</label>
                <input type="text" name="phone" value="{{ contact.phone }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
        </div>
        
        <div class="mb-6">
            <label class="block text-gray-700 font-medium mb-2">Shipping Info</label>
            <input type="text" name="shipping_info" value="{{ contact.shipping_info }}" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
        </div>
        
        <h3 class="text-lg font-bold mb-4 mt-6">Social Media Links</h3>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700 font-medium mb-2">Instagram URL</label>
                <input type="url" name="instagram" value="{{ contact.instagram }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-2">TikTok URL</label>
                <input type="url" name="tiktok" value="{{ contact.tiktok }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-2">Facebook URL</label>
                <input type="url" name="facebook" value="{{ contact.facebook }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-2">Pinterest URL</label>
                <input type="url" name="pinterest" value="{{ contact.pinterest }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
        </div>
        
        <div class="mt-6">
            <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition-colors">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
