<!-- templates/admin/hero.html -->
{% extends "admin/base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">Hero Section</h1>
</div>

<div class="bg-white rounded-xl shadow-md p-6">
    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-2">Title</label>
            <input type="text" name="title" value="{{ hero.title }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            <p class="text-sm text-gray-500 mt-1">Use HTML for colored text: &lt;span class="text-purple-700"&gt;text&lt;/span&gt;</p>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-2">Subtitle</label>
            <textarea name="subtitle" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">{{ hero.subtitle }}</textarea>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-gray-700 font-medium mb-2">Button 1 Text</label>
                <input type="text" name="button1_text" value="{{ hero.button1_text }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-2">Button 2 Text</label>
                <input type="text" name="button2_text" value="{{ hero.button2_text }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
        </div>
        
        <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition-colors">Save Changes</button>
    </form>
</div>

<div class="mt-8 bg-blue-50 rounded-xl p-6">
    <h3 class="font-bold mb-2">Preview:</h3>
    <div class="bg-white p-4 rounded-lg">
        <h1 class="text-2xl font-bold">{{ hero.title|safe }}</h1>
        <p class="text-gray-600 mt-2">{{ hero.subtitle }}</p>
        <div class="flex space-x-3 mt-3">
            <button class="bg-purple-700 text-white px-4 py-2 rounded-lg text-sm">{{ hero.button1_text }}</button>
            <button class="border-2 border-purple-700 text-purple-700 px-4 py-2 rounded-lg text-sm">{{ hero.button2_text }}</button>
        </div>
    </div>
</div>
{% endblock %}
