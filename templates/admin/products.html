<!-- templates/admin/products.html -->
{% extends "admin/base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">Products</h1>
    <a href="{{ url_for('admin_product_add') }}" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors">
        <i class="fas fa-plus mr-2"></i>Add Product
    </a>
</div>

<div class="bg-white rounded-xl shadow-md overflow-hidden">
    <table class="w-full">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Order</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Icon</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Colors</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
            {% for product in products %}
            <tr>
                <td class="px-6 py-4">{{ product.order }}</td>
                <td class="px-6 py-4"><i class="fas {{ product.icon }} text-purple-600 text-xl"></i></td>
                <td class="px-6 py-4 font-medium">{{ product.name }}</td>
                <td class="px-6 py-4">
                    <span class="inline-block w-6 h-6 rounded bg-{{ product.gradient_from }}"></span> → 
                    <span class="inline-block w-6 h-6 rounded bg-{{ product.gradient_to }}"></span>
                </td>
                <td class="px-6 py-4">
                    <a href="{{ url_for('admin_product_edit', id=product.id) }}" class="text-blue-600 hover:text-blue-800 mr-3">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a href="{{ url_for('admin_product_delete', id=product.id) }}" class="text-red-600 hover:text-red-800" onclick="return confirm('Are you sure?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" class="px-6 py-8 text-center text-gray-500">No products added yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
